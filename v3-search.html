<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Search POSH • POSH</title>

  <meta name="description" content="Search POSH pages, apps, games, devices, downloads, behaviour topics, urgent warning signs, and child safety guidance." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://poshaussie.com.au/v3-search.html" />

  <link rel="stylesheet" href="style.css"/>
</head>

<body>
<div class="wrap">

  <div class="brand">POSH</div>
  <h1 class="page-title">Search POSH</h1>

  <p class="tagline">
    <strong>Find what you need fast.</strong><br/>
    Apps, games, grooming risks, behaviour changes, urgent help, and parent guidance.
  </p>

  <div id="nav"></div>

  <!-- SEARCH -->
  <div class="card center-card">
    <h2>Search</h2>

    <div class="search-page-row">
      <input
        type="text"
        id="searchInput"
        class="search-page-input"
        placeholder="e.g. roblox chat, grooming signs, deleted messages"
        autocomplete="off"
      />
      <button class="btn" id="searchBtn">Search</button>
    </div>

    <div class="callout center-callout" style="margin-top:16px;">
      Try: <strong>roblox</strong>, <strong>discord</strong>, <strong>grooming</strong>, <strong>deleted messages</strong>, <strong>device safety</strong>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="card center-card">
    <h2 id="resultsHeading">Results</h2>
    <p class="note" id="resultsCount">Type something above to search.</p>

    <div id="resultsList" class="search-results-list"></div>

    <div id="noResults" class="callout center-callout" style="display:none;">
      No results found. Try broader keywords.
    </div>
  </div>

  <div id="footer"></div>

</div>

<!-- IMPORTANT: LOAD INDEX -->
<script src="search-index.js"></script>
<script src="app.js"></script>

<script>
(function(){

  /* =========================
     SAFE HELPERS (XSS SAFE)
  ========================= */

  function escapeHTML(str){
    return String(str || "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;");
  }

  function normalize(text){
    return (text || "")
      .toLowerCase()
      .replace(/[^a-z0-9\s]/g," ")
      .replace(/\s+/g," ")
      .trim();
  }

  function getQuery(){
    return new URLSearchParams(window.location.search).get("q") || "";
  }

  function setQuery(q){
    const url = new URL(window.location);
    if(q) url.searchParams.set("q", q);
    else url.searchParams.delete("q");
    history.replaceState({}, "", url);
  }

  /* =========================
     SEARCH LOGIC
  ========================= */

  function score(item, query){
    const q = normalize(query);
    const text = normalize(
      item.title + " " +
      item.description + " " +
      item.keywords + " " +
      item.category
    );

    let s = 0;

    if(text.includes(q)) s += 40;

    q.split(" ").forEach(t=>{
      if(text.includes(t)) s += 10;
    });

    return s;
  }

  function search(query){
    if(!query.trim()) return [];

    return window.POSH_SEARCH_INDEX
      .map(i => ({...i, score: score(i, query)}))
      .filter(i => i.score > 0)
      .sort((a,b)=>b.score-a.score)
      .slice(0,50);
  }

  /* =========================
     RENDER
  ========================= */

  function render(query){

    const list = document.getElementById("resultsList");
    const count = document.getElementById("resultsCount");
    const no = document.getElementById("noResults");
    const heading = document.getElementById("resultsHeading");

    const results = search(query);

    heading.textContent = query ? `Results for: ${query}` : "Results";
    count.textContent = results.length + " result" + (results.length===1?"":"s");

    if(!results.length){
      list.innerHTML = "";
      no.style.display = "block";
      return;
    }

    no.style.display = "none";

    list.innerHTML = results.map(item => `
      <a href="${escapeHTML(item.href)}" class="search-result-card search-result-link">
        <div class="search-result-top">
          <strong>${escapeHTML(item.title)}</strong>
          <span class="search-result-type">${escapeHTML(item.category)}</span>
        </div>
        <div class="search-result-url">${escapeHTML(item.href)}</div>
        <div style="margin-top:6px;">${escapeHTML(item.description)}</div>
      </a>
    `).join("");
  }

  /* =========================
     INIT
  ========================= */

  document.addEventListener("DOMContentLoaded", function(){

    const input = document.getElementById("searchInput");
    const btn = document.getElementById("searchBtn");

    const initial = getQuery();
    input.value = initial;
    render(initial);

    btn.addEventListener("click", ()=>{
      const q = input.value.trim();
      setQuery(q);
      render(q);
    });

    input.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        e.preventDefault();
        const q = input.value.trim();
        setQuery(q);
        render(q);
      }
    });

  });

})();
</script>

</body>
</html>
